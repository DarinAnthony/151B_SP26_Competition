# Standard 11-prompt sweep on the 100-q `default` slice.
# Every prompt runs at the same MAX_TOKENS (from eval.max_tokens, default 4096)
# so accuracy / pct_boxed / avg_tokens numbers are apples-to-apples.
# Self-consistency entries override regime to high_div_8 (T=0.8, n=8).

runs:
  - prompt_id: baseline_starter
  - prompt_id: cot_explicit
  - prompt_id: cot_structured
  - prompt_id: fewshot_2_basic
  - prompt_id: fewshot_3_diverse
  - prompt_id: sc_diverse_paths
    regime: high_div_8
  - prompt_id: sc_terse
    regime: high_div_8
  - prompt_id: php_basic
  - prompt_id: php_skeptical
  - prompt_id: force_early_boxed
  - prompt_id: plan_and_solve
  - prompt_id: self_refine_1pass
