# Tiny GRPO run for plumbing checks: 2 steps, HF rollout (fast spin-up, runs
# anywhere), a handful of training rows, short completions. Not for real signal.

train_data_path: data/public.jsonl
train_start_index: 100
max_train_samples: 8          # cap the training set so a step is cheap

# ── Rollout / group ────────────────────────────────────────────────────────
num_generations: 2
max_prompt_length: 1024
max_completion_length: 512
temperature: 1.0
top_p: 1.0

# ── RL / optimization ──────────────────────────────────────────────────────
beta: 0.04
learning_rate: 1.0e-6
per_device_train_batch_size: 2  # == num_generations
gradient_accumulation_steps: 1
max_steps: 2
num_train_epochs: 1
warmup_ratio: 0.0
lr_scheduler_type: constant
bf16: true
gradient_checkpointing: true
use_liger_loss: false         # keep the smoke test on the plain GRPO loss path (no
                              # liger-kernel dependency needed); 512-token completions
                              # don't need the chunked-logits memory win.

# ── Reward shaping (see reward.py; same knobs as demo) ──────────────────────
reward_brevity_weight: 0.3
reward_brevity_soft_len: null   # null → = max_completion_length
reward_format_weight: 0.1
reward_trunc_weight: 0.1

# ── Rollout backend: HF (no vLLM engine to spin up) ─────────────────────────
use_vllm: false
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.3

# ── Logging ────────────────────────────────────────────────────────────────
log_completions: true
logging_steps: 1
save_steps: 2
report_to: none
