# Small-but-real GRPO defaults. Tuned to finish a sanity-checkable run on a Colab
# A100. Scale up max_steps / num_generations once the curve looks healthy.

train_data_path: data/public.jsonl
train_start_index: 100        # train on public.jsonl[100:] — disjoint from the first-100 eval slice (no leakage)
max_train_samples: null       # null = use all rows from train_start_index onward

# ── Rollout / group ────────────────────────────────────────────────────────
num_generations: 4            # GRPO group size G (completions per prompt to compare)
max_prompt_length: 1024
max_completion_length: 8192   # Qwen3-4B-Thinking emits long <think> traces; give them room
temperature: 1.0              # sampling REQUIRED — temp=0 collapses the group → zero advantage
top_p: 1.0

# ── RL / optimization ──────────────────────────────────────────────────────
beta: 0.04                    # KL coefficient to the reference (base) policy
learning_rate: 1.0e-6         # RL-low (not the 1e-4 SFT uses)
per_device_train_batch_size: 4  # multiple of num_generations (divisibility constraint)
gradient_accumulation_steps: 4
max_steps: 50
num_train_epochs: 1
warmup_ratio: 0.03
lr_scheduler_type: constant
bf16: true
gradient_checkpointing: true

# ── vLLM rollout backend (colocate on a single GPU). Falls back to HF on error. ─
use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.3

# ── Logging ────────────────────────────────────────────────────────────────
log_completions: true         # dump sample completions — invaluable for spotting reward hacking
logging_steps: 1
save_steps: 25
report_to: none
