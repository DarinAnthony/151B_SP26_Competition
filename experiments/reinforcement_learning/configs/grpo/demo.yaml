# Small-but-real GRPO defaults. Tuned to finish a sanity-checkable run on a Colab
# A100. Scale up max_steps / num_generations once the curve looks healthy.

train_data_path: data/public.jsonl
train_start_index: 100        # train on public.jsonl[100:] — disjoint from the first-100 eval slice (no leakage)
max_train_samples: null       # null = use all rows from train_start_index onward

# ── Rollout / group ────────────────────────────────────────────────────────
num_generations: 2            # GRPO group size G. Floored at 2 (the minimum for a
                              # group-relative advantage). Going to G=4 forces
                              # per_device_train_batch_size=4 (divisibility), and the logits
                              # peak scales with batch*(prompt+completion): B=4 at 4096
                              # (20,480 token-rows) is MORE memory than B=2 at 8192 (18,432)
                              # and OOMs an 80GB A100. G=4 would need completion ≤ ~3072.
max_prompt_length: 1024
max_completion_length: 4096   # Qwen3-4B-Thinking emits long <think> traces; this caps them.
                              # The GRPO logits tensor is [per_device_bs, prompt+completion,
                              # vocab=151936] upcast to fp32 + its grad — the dominant memory
                              # cost. At B=2/4096 the peak is ~30 GiB (was ~37 at 8192).
                              # Traces that exceed 4096 get truncated → no boxed answer →
                              # reward 0; raise only if you also cut batch/group.
temperature: 1.0              # sampling REQUIRED — temp=0 collapses the group → zero advantage
top_p: 1.0

# ── RL / optimization ──────────────────────────────────────────────────────
beta: 0.04                    # KL coefficient to the reference (base) policy
learning_rate: 1.0e-6         # RL-low (not the 1e-4 SFT uses)
per_device_train_batch_size: 2  # multiple of num_generations (divisibility constraint).
                                # prompts/step = (bs*grad_accum)/G = (2*4)/2 = 4 — same
                                # effective batch as a (4*4)/4 G=4 setup, just smaller groups.
gradient_accumulation_steps: 4
max_steps: 50
num_train_epochs: 1
warmup_ratio: 0.03
lr_scheduler_type: constant
bf16: true
gradient_checkpointing: true

# ── vLLM rollout backend (colocate on a single GPU). Falls back to HF on error. ─
use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.3   # colocate holds TWO 4B copies (vLLM rollout engine +
                                   # HF training model). At B=2/4096 the training peak is
                                   # only ~30 GiB, so we can afford a larger vLLM slice:
                                   # 0.3 reserves ~24 GiB (~16 GiB KV, ~6x concurrency at
                                   # 5120 ctx) for faster rollouts. Budget ≈ 24+30 of 79 GiB.

# ── Logging ────────────────────────────────────────────────────────────────
log_completions: true         # dump sample completions — invaluable for spotting reward hacking
logging_steps: 1
save_steps: 25
report_to: none
